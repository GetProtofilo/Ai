<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium LMS Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #FFD700; /* Gold accent */
            --bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Fancy Background Glow */
        .glow {
            position: fixed;
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(255,215,0,0.15) 0%, rgba(0,0,0,0) 70%);
            top: -100px; right: -100px; z-index: -1;
        }

        .container { width: 90%; max-width: 400px; text-align: center; }

        /* Card Styling */
        .glass-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* Bold Typography */
        h1 { font-weight: 900; font-size: 28px; letter-spacing: -1px; margin-bottom: 10px; }
        p { color: #888; font-size: 14px; margin-bottom: 30px; }

        /* Premium Inputs */
        .input-box {
            width: 100%;
            background: #252525;
            border: 2px solid transparent;
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            margin-bottom: 15px;
            outline: none;
            transition: 0.3s;
        }
        .input-box:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(255,215,0,0.2); }

        /* THE IMPRESSIVE BUTTON */
        .fancy-btn {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .fancy-btn:hover { transform: scale(1.02); box-shadow: 0 10px 20px rgba(255,215,0,0.3); }
        .fancy-btn:active { transform: scale(0.98); }

        /* Video Player Section */
        #video-section { display: none; }
        .video-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 15px;
            margin-top: 20px;
            overflow: hidden;
            border: 1px solid var(--accent);
        }

        /* Features List */
        .features {
            margin-top: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            text-align: left;
        }
        .feat-item { font-size: 11px; font-weight: 700; background: #252525; padding: 8px; border-radius: 8px; color: var(--accent); }

    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="container">
        <div id="login-card" class="glass-card">
            <h1>VIP ACCESS</h1>
            <p>Enter your student credentials to unlock the course videos.</p>
            
            <input type="text" class="input-box" placeholder="STUDENT ID">
            <input type="password" class="input-box" placeholder="ACCESS KEY">
            
            <button class="fancy-btn" onclick="startLoading()">
                <span>UNLOCK CONTENT</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>

            <div class="features">
                <div class="feat-item">✔ AUTO-ACCESS</div>
                <div class="feat-item">✔ VIMEO SECURE</div>
                <div class="feat-item">✔ MOBILE READY</div>
                <div class="feat-item">✔ NO ADS</div>
            </div>
        </div>

        <div id="video-section" class="glass-card">
            <h1 style="text-align: left; font-size: 20px;">WELCOME BACK!</h1>
            <p style="text-align: left;">Course: Digital Masterclass 2026</p>
            
            <div class="video-container" id="player">
                </div>

            <button class="fancy-btn" style="margin-top: 20px; background: #333; color: white;" onclick="window.location.reload()">
                LOGOUT
            </button>
        </div>
    </div>

    <script>
        function startLoading() {
            const btn = document.querySelector('.fancy-btn');
            btn.innerHTML = 'VALIDATING...';
            btn.style.opacity = '0.7';

            // Simulate "Automatic Access" Check
            setTimeout(() => {
                document.getElementById('login-card').style.display = 'none';
                document.getElementById('video-section').style.display = 'block';
                
                // Injecting a high-quality Vimeo placeholder
                document.getElementById('player').innerHTML = `
                    <iframe src="https://player.vimeo.com/video/347119375?color=FFD700&title=0&byline=0&portrait=0" 
                    style="width:100%;height:100%;" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
                `;
            }, 1500);
        }
    </script>
</body>
</html>
